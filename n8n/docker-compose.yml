version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # --- Server ---
      - N8N_HOST=${N8N_HOST:-n8n.yourdomain.com}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${N8N_HOST:-n8n.yourdomain.com}/
      - GENERIC_TIMEZONE=Europe/Berlin
      - TZ=Europe/Berlin

      # --- Auth (Basic Auth) ---
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-change_me_secure_password}

      # --- Encryption ---
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-generate_32_char_random_key_here}

      # --- Email (für Fehler-Benachrichtigungen) ---
      - N8N_EMAIL_MODE=smtp
      - N8N_SMTP_HOST=${SMTP_HOST:-smtp.brevo.com}
      - N8N_SMTP_PORT=${SMTP_PORT:-587}
      - N8N_SMTP_USER=${SMTP_USER}
      - N8N_SMTP_PASS=${SMTP_PASS}
      - N8N_SMTP_SENDER=${SMTP_FROM:-noreply@yourdomain.com}

      # --- BauHub Umgebungsvariablen (für Workflows) ---
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@yourdomain.com}
      - SITE_URL=${SITE_URL:-https://bauhub.vercel.app}

      # --- Performance ---
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=none
      - EXECUTIONS_DATA_MAX_AGE=72
      - N8N_METRICS=false
      - N8N_LOG_LEVEL=info

    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/.n8n/workflows-import:ro

    networks:
      - n8n_network

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (optional, wenn kein externes Nginx)
  # Auskommentieren wenn Nginx direkt auf dem Host läuft
  # nginx:
  #   image: nginx:alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #   networks:
  #     - n8n_network
  #   depends_on:
  #     - n8n

volumes:
  n8n_data:
    driver: local

networks:
  n8n_network:
    driver: bridge
