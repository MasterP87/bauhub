name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase functions deploy users-register --project-ref $PROJECT_REF --no-verify-jwt
          supabase functions deploy users-verify --project-ref $PROJECT_REF --no-verify-jwt
          supabase functions deploy projects-create --project-ref $PROJECT_REF --no-verify-jwt
          supabase functions deploy projects-apply --project-ref $PROJECT_REF --no-verify-jwt
          supabase functions deploy matching-run --project-ref $PROJECT_REF --no-verify-jwt
          supabase functions deploy matches-confirm --project-ref $PROJECT_REF --no-verify-jwt
          supabase functions deploy premium-subscribe --project-ref $PROJECT_REF --no-verify-jwt
          supabase functions deploy forum-create --project-ref $PROJECT_REF --no-verify-jwt
          supabase functions deploy forum-moderate --project-ref $PROJECT_REF --no-verify-jwt
          supabase functions deploy resources-create --project-ref $PROJECT_REF --no-verify-jwt
          supabase functions deploy admin-report --project-ref $PROJECT_REF --no-verify-jwt

      - name: Set Edge Function Secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase secrets set \
            STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            N8N_WEBHOOK_USER_VERIFY="${{ secrets.N8N_WEBHOOK_USER_VERIFY }}" \
            N8N_WEBHOOK_MATCHING="${{ secrets.N8N_WEBHOOK_MATCHING }}" \
            N8N_WEBHOOK_APPLICATION="${{ secrets.N8N_WEBHOOK_APPLICATION }}" \
            N8N_WEBHOOK_MATCH_CONFIRM="${{ secrets.N8N_WEBHOOK_MATCH_CONFIRM }}" \
            N8N_WEBHOOK_FORUM_MODERATE="${{ secrets.N8N_WEBHOOK_FORUM_MODERATE }}" \
            STRIPE_PREMIUM_PRICE_ID="${{ secrets.STRIPE_PREMIUM_PRICE_ID }}" \
            SITE_URL="${{ secrets.SITE_URL }}" \
            ADMIN_API_KEY="${{ secrets.ADMIN_API_KEY }}" \
            --project-ref $PROJECT_REF
